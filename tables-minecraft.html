<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMES CRAFT — Sauve le mouton !</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

:root {
  --gold: #FFD700;
  --diamond: #5CE6F7;
  --redstone: #FF3300;
  --emerald: #00E86B;
  --night: #0A0E1A;
  --grass-top: #5D9B3F;
  --dirt: #7A5C3A;
  --pixelfont: 'Press Start 2P', monospace;
  --vt: 'VT323', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

body {
  background: var(--night);
  font-family: var(--pixelfont);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 8% 12%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 38%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 52% 8%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 68% 55%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 83% 22%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 18% 72%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 42% 82%, white 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 78%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 32%, rgba(255,255,255,.6) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}

.ground {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 44px; z-index: 1;
  background: repeating-linear-gradient(90deg, var(--dirt) 0, var(--dirt) 16px, #6B4E2F 16px, #6B4E2F 17px);
  border-top: 8px solid var(--grass-top);
}

#app {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 16px 56px;
}

.screen { display: none; width: 100%; max-width: 640px; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

/* ===== TITLE ===== */
.title-logo { text-align: center; margin-bottom: 4px; }
.title-logo .line1 {
  display: block;
  font-size: clamp(18px, 4.5vw, 32px);
  color: var(--gold);
  text-shadow: 4px 4px 0 #7A5500;
  animation: bob 1.6s ease-in-out infinite alternate;
  letter-spacing: 2px;
}
.title-logo .line2 {
  display: block;
  font-size: clamp(7px, 1.8vw, 11px);
  color: var(--diamond);
  letter-spacing: 3px;
  margin-top: 4px;
  text-shadow: 2px 2px 0 #004455;
}
@keyframes bob { from { transform: translateY(0); } to { transform: translateY(-5px); } }

.menu-panel {
  background: #1A1A1A;
  border: 4px solid #555;
  box-shadow: inset -4px -4px 0 rgba(0,0,0,.5), inset 4px 4px 0 rgba(255,255,255,.08), 0 6px 0 #000;
  padding: 20px 24px;
  width: 100%;
  display: flex; flex-direction: column; gap: 10px;
}
.panel-title {
  font-size: 9px; color: #666; text-align: center; letter-spacing: 2px; margin-bottom: 2px;
}

.mode-btn {
  display: flex; align-items: center; gap: 14px;
  background: #2D5A1B; border: 4px solid #3E7A25;
  box-shadow: 0 4px 0 #1A3310, inset 2px 2px 0 rgba(255,255,255,.08);
  color: white; font-family: var(--pixelfont); font-size: 9px;
  padding: 12px 14px; cursor: pointer; text-align: left; line-height: 1.6; width: 100%;
  transition: all .1s;
}
.mode-btn:hover { background: #3A7025; }
.mode-btn:active { transform: translateY(4px); box-shadow: none; }
.mode-btn.active-mode { background: #3A7025; border-color: #7AE040; }
.mode-btn .btn-icon { font-size: 28px; flex-shrink: 0; }
.mode-btn .btn-desc { font-size: 7px; color: #aaa; margin-top: 3px; display: block; }

.table-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%;
}
.table-btn {
  background: #383838; border: 3px solid #555; box-shadow: 0 3px 0 #111;
  color: #ccc; font-family: var(--pixelfont); font-size: 9px;
  padding: 9px 4px; cursor: pointer; text-align: center; transition: all .1s;
}
.table-btn:hover, .table-btn.selected {
  background: var(--gold); color: #222; border-color: #AA9000; box-shadow: 0 3px 0 #665500;
}
.table-btn:active { transform: translateY(3px); box-shadow: none; }

.play-btn {
  background: #7A2020; border: 4px solid #AA3333; box-shadow: 0 5px 0 #3D0000;
  color: var(--gold); font-family: var(--pixelfont); font-size: 12px;
  padding: 14px 32px; cursor: pointer; letter-spacing: 2px;
  transition: all .1s; width: 100%; text-shadow: 2px 2px 0 #000;
}
.play-btn:hover { background: #993333; }
.play-btn:active { transform: translateY(5px); box-shadow: none; }
.play-btn:disabled { opacity: .4; cursor: default; transform: none; box-shadow: 0 5px 0 #3D0000; }

.top-scores-mini {
  font-family: var(--vt); font-size: 17px; color: #777; text-align: center; width: 100%;
}
.top-scores-mini span { color: var(--gold); }

/* ===== HUD ===== */
.hud {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; background: rgba(0,0,0,.75); border: 3px solid #444; padding: 8px 14px;
}
.hud-item { text-align: center; }
.hud-label { font-size: 6px; color: #666; letter-spacing: 1px; }
.hud-value { font-size: 13px; color: white; margin-top: 2px; }
.hud-value.score-v { color: var(--emerald); }
.hud-value.survive-v { color: var(--diamond); }
.hud-value.combo-v { color: var(--gold); }

/* ===== ARENA ===== */
.arena-wrap {
  width: 100%; background: #111; border: 4px solid #333;
  position: relative; overflow: hidden; height: 110px;
}
.arena-sky {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, #0D1A2E 0%, #1A2A3A 70%, #1A1A1A 100%);
}
.arena-ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
  background: repeating-linear-gradient(90deg, var(--dirt) 0, var(--dirt) 16px, #6B4E2F 16px, #6B4E2F 17px);
  border-top: 6px solid var(--grass-top);
}
.arena-danger {
  position: absolute; inset: 0;
  background: rgba(255,0,0,0); transition: background .3s; pointer-events: none;
}
.character {
  position: absolute; bottom: 28px;
  font-size: 40px; line-height: 1;
  transition: left .22s cubic-bezier(.22,1,.36,1);
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,.8));
  width: 44px; height: 52px;
  display: flex; align-items: flex-end;
}
.character svg { display: block; }
#char-zombie { left: 2%; }
#char-sheep  { right: 4%; }

@keyframes zombieLunge { 0%,100%{transform:scale(1)} 40%{transform:scale(1.45) translateX(14px)} }
.zombie-lunge { animation: zombieLunge .35s ease-out; }
@keyframes zombieRetreat { 0%{transform:translateX(0)} 30%{transform:translateX(-22px) scale(.8)} 100%{transform:translateX(0) scale(1)} }
.zombie-retreat { animation: zombieRetreat .4s ease-out; }
@keyframes sheepScared { 0%,100%{transform:scale(1)} 50%{transform:scale(.85) translateY(-4px)} }
.sheep-scared { animation: sheepScared .3s; }

/* ===== DISTANCE BAR ===== */
.dist-bar-wrap { width:100%; height:10px; background:#1A1A1A; border-bottom:3px solid #333; }
.dist-bar-fill { height:100%; background:var(--emerald); transition:width .22s; }
.dist-bar-fill.warn { background:#FFB300; }
.dist-bar-fill.danger { background:var(--redstone); animation:blinkbar .3s step-end infinite; }
@keyframes blinkbar { 50%{opacity:.3} }

/* ===== SPEED PIPS ===== */
.speed-bar-wrap { width:100%; display:flex; align-items:center; gap:8px; padding:0 4px; }
.speed-label { font-size:6px; color:#444; letter-spacing:1px; white-space:nowrap; }
.speed-pips { display:flex; gap:3px; flex:1; }
.speed-pip { flex:1; height:6px; background:#1A1A1A; border:1px solid #2A2A2A; }
.speed-pip.lit      { background:var(--emerald); }
.speed-pip.lit.med  { background:#FFB300; }
.speed-pip.lit.fast { background:var(--redstone); }

/* ===== QUESTION ===== */
.question-card {
  background:#1A1A1A; border:4px solid #444;
  box-shadow:inset -3px -3px 0 rgba(0,0,0,.4),0 6px 0 #000;
  padding:14px 22px; text-align:center; width:100%; position:relative;
}
.bonus-badge {
  position:absolute; top:-12px; right:12px;
  background:#7A2020; border:3px solid #FF4444;
  color:var(--gold); font-size:7px; padding:3px 8px;
  animation:badgePop .3s ease-out; letter-spacing:1px;
}
@keyframes badgePop { from{transform:scale(0) rotate(-10deg)} to{transform:scale(1) rotate(0)} }

.question-text {
  font-size:clamp(22px,5.5vw,38px); color:white; letter-spacing:3px; text-shadow:3px 3px 0 #333;
}
.question-text .op { color:var(--diamond); }
.question-text .eq { color:#555; }
.question-text .blank { color:var(--gold); text-decoration:underline; text-underline-offset:5px; }
.question-text.bonus-q .blank { color:#FF6B6B; }

.combo-line { font-size:9px; color:var(--gold); height:16px; text-align:center; letter-spacing:2px; margin-top:2px; }

/* ===== ANSWERS ===== */
.answers-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.answer-btn {
  background:#252525; border:4px solid #444; box-shadow:0 5px 0 #111;
  color:white; font-family:var(--pixelfont); font-size:clamp(16px,3.5vw,24px);
  padding:16px; cursor:pointer; transition:all .1s;
}
.answer-btn:hover:not(:disabled) { background:#2E2E4A; border-color:var(--diamond); }
.answer-btn:active:not(:disabled) { transform:translateY(5px); box-shadow:none; }
.answer-btn.correct { background:#1A4A1A; border-color:var(--emerald); color:var(--emerald); }
.answer-btn.wrong   { background:#4A1A1A; border-color:var(--redstone); color:var(--redstone); animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ===== TYPE ZONE ===== */
.type-zone { display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; }
.type-input {
  background:#111; border:4px solid var(--gold); color:var(--gold);
  font-family:var(--pixelfont); font-size:32px; text-align:center;
  padding:12px; width:140px; outline:none;
  box-shadow:0 4px 0 #664400,inset 2px 2px 0 rgba(0,0,0,.5); caret-color:var(--gold);
}
.type-input:focus { border-color:var(--diamond); box-shadow:0 4px 0 #004466; }
.type-input.correct { border-color:var(--emerald); color:var(--emerald); }
.type-input.wrong   { border-color:var(--redstone); color:var(--redstone); animation:shake .3s; }

.numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; width:100%; max-width:260px; }
.numpad-btn {
  background:#2A2A2A; border:3px solid #444; box-shadow:0 3px 0 #111;
  color:white; font-family:var(--pixelfont); font-size:16px;
  padding:12px; cursor:pointer; transition:all .1s; text-align:center;
}
.numpad-btn:active { transform:translateY(3px); box-shadow:none; background:#444; }
.numpad-btn.clear { background:#4A1A1A; border-color:#7A2A2A; }
.numpad-btn.ok    { background:#1A3A1A; border-color:#3A6A3A; }

/* ===== FEEDBACK ===== */
.feedback {
  position:fixed; top:18%; left:50%; transform:translateX(-50%);
  font-size:clamp(16px,4vw,24px); pointer-events:none; z-index:100;
  text-shadow:3px 3px 0 #000; animation:feedPop .65s ease-out forwards; white-space:nowrap;
}
@keyframes feedPop {
  0%{opacity:1;transform:translateX(-50%) scale(1)}
  55%{opacity:1;transform:translateX(-50%) scale(1.25) translateY(-8px)}
  100%{opacity:0;transform:translateX(-50%) scale(.8) translateY(-28px)}
}
.feedback.correct { color:var(--emerald); }
.feedback.wrong   { color:var(--redstone); }
.feedback.bonus   { color:#FF8888; font-size:clamp(18px,4.5vw,28px); }

.particle { position:fixed; font-size:18px; pointer-events:none; z-index:50; animation:partFly 1.1s ease-out forwards; }
@keyframes partFly { 0%{opacity:1;transform:translateY(0) rotate(0)} 100%{opacity:0;transform:translateY(-70px) rotate(360deg)} }

/* ===== COUNTDOWN ===== */
.countdown-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.88);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
.countdown-num { font-size:110px; color:var(--gold); text-shadow:8px 8px 0 #664400; animation:cntPop .7s ease-out; }
@keyframes cntPop { 0%{transform:scale(2);opacity:0} 60%{transform:scale(.92)} 100%{transform:scale(1);opacity:1} }
.countdown-label { font-size:10px; color:#777; letter-spacing:4px; }

/* ===== GAME OVER ===== */
.gameover-title {
  font-size:clamp(14px,3.5vw,22px); color:var(--redstone); text-align:center;
  text-shadow:4px 4px 0 #660000; animation:bob .9s ease-in-out infinite alternate; letter-spacing:2px;
}
.rank-badge {
  text-align:center; padding:10px 20px;
  background:#1A1400; border:4px solid var(--gold); box-shadow:0 4px 0 #443300;
}
.rank-letter { font-size:44px; color:var(--gold); text-shadow:4px 4px 0 #664400; }
.rank-label  { font-size:7px; color:#666; margin-top:2px; letter-spacing:2px; }

.score-panel {
  background:#0D1A0D; border:4px solid var(--emerald); box-shadow:0 5px 0 #002200;
  padding:16px 22px; width:100%; display:flex; flex-direction:column; gap:8px;
}
.score-row { display:flex; justify-content:space-between; align-items:center; font-family:var(--vt); font-size:20px; }
.score-row .slabel { color:#666; }
.score-row .sval   { color:white; }
.score-row.total .sval { color:var(--gold); font-size:26px; }
.score-divider { border:none; border-top:2px solid #1A2A1A; margin:2px 0; }

.name-entry {
  width:100%; background:#1A1A1A; border:4px solid #444;
  padding:14px 18px; display:flex; flex-direction:column; gap:8px; align-items:center;
}
.name-entry label { font-size:7px; color:#666; letter-spacing:2px; }
.name-input {
  background:#111; border:3px solid var(--gold); color:var(--gold);
  font-family:var(--pixelfont); font-size:18px; text-align:center;
  padding:8px 14px; width:180px; outline:none; letter-spacing:4px; text-transform:uppercase;
}

.leaderboard { width:100%; background:#080808; border:3px solid #2A2A2A; padding:10px 14px; }
.lb-title { font-size:8px; color:#444; letter-spacing:2px; text-align:center; margin-bottom:8px; }
.lb-row { display:flex; gap:8px; align-items:center; font-family:var(--vt); font-size:19px; padding:3px 0; border-bottom:1px solid #0E0E0E; color:#aaa; }
.lb-row:last-child { border-bottom:none; }
.lb-row .lb-rank  { color:#444; min-width:22px; }
.lb-row.lb-gold   .lb-rank,.lb-row.lb-gold   .lb-score { color:var(--gold); }
.lb-row.lb-silver .lb-rank,.lb-row.lb-silver .lb-score { color:#aaa; }
.lb-row.lb-bronze .lb-rank,.lb-row.lb-bronze .lb-score { color:#cd7f32; }
.lb-row.lb-new { color:var(--emerald); }
.lb-row .lb-name  { flex:1; }
.lb-row .lb-score { text-align:right; }

.action-btns { display:flex; gap:10px; width:100%; }
.retry-btn {
  background:#1A3A5A; border:4px solid #2A6AAA; box-shadow:0 5px 0 #0A1A2A;
  color:var(--diamond); font-family:var(--pixelfont); font-size:8px;
  padding:12px 14px; cursor:pointer; flex:1; letter-spacing:1px; transition:all .1s;
}
.retry-btn:hover { background:#2A4A7A; }
.retry-btn:active { transform:translateY(5px); box-shadow:none; }
.action-btns .play-btn { flex:1; font-size:9px; }

@keyframes screenFlash { 0%,100%{background:transparent} 50%{background:rgba(255,0,0,.18)} }
.flash-error { animation:screenFlash .35s; }
</style>
</head>
<body>
<div class="ground"></div>
<div id="app">

  <!-- TITLE -->
  <div id="screen-title" class="screen active">
    <div class="title-logo">
      <span class="line1">⛏ TIMES CRAFT ⛏</span>
      <span class="line2">SAUVE LE MOUTON !</span>
    </div>
    <div style="font-size:52px;text-align:center;animation:bob 1.8s ease-in-out infinite alternate;filter:drop-shadow(3px 3px 0 rgba(0,0,0,.7))">🧟&nbsp;&nbsp;🐑</div>

    <div class="menu-panel">
      <div class="panel-title">— MODE DE JEU —</div>
      <button class="mode-btn" id="btn-qcm" onclick="selectMode('qcm')">
        <span class="btn-icon">🎯</span>
        <span>MODE QCM<span class="btn-desc">Choisis parmi 4 réponses</span></span>
      </button>
      <button class="mode-btn" id="btn-type" onclick="selectMode('type')">
        <span class="btn-icon">⌨️</span>
        <span>MODE FRAPPE<span class="btn-desc">Tape la réponse toi-même</span></span>
      </button>
    </div>

    <div class="menu-panel">
      <div class="panel-title">— QUELLE TABLE ? —</div>
      <div class="table-grid" id="table-selector"></div>
    </div>

    <div id="top3-display" class="top-scores-mini"></div>
    <button class="play-btn" id="play-btn" onclick="startGame()" disabled>▶ JOUER</button>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="hud">
      <div class="hud-item"><div class="hud-label">TABLE</div><div class="hud-value" id="hud-table">×?</div></div>
      <div class="hud-item"><div class="hud-label">SURVIE</div><div class="hud-value survive-v" id="hud-survive">0s</div></div>
      <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-value score-v" id="hud-score">0</div></div>
      <div class="hud-item"><div class="hud-label">COMBO</div><div class="hud-value combo-v" id="hud-combo">—</div></div>
    </div>

    <div class="dist-bar-wrap"><div class="dist-bar-fill" id="dist-bar" style="width:100%"></div></div>

    <div class="arena-wrap" id="arena">
      <div class="arena-sky"></div>
      <div class="arena-danger" id="arena-danger"></div>
      <div class="arena-ground"></div>
      <div class="character" id="char-zombie">🧟</div>
      <div class="character" id="char-sheep" style="right:4%;left:auto">🐑</div>
    </div>

    <div class="speed-bar-wrap">
      <span class="speed-label">VITESSE</span>
      <div class="speed-pips" id="speed-pips"></div>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-text" id="question-display"></div>
    </div>
    <div class="combo-line" id="combo-line"></div>

    <div class="answers-grid" id="qcm-zone" style="display:none">
      <button class="answer-btn" id="ans0" onclick="submitQCM(0)"></button>
      <button class="answer-btn" id="ans1" onclick="submitQCM(1)"></button>
      <button class="answer-btn" id="ans2" onclick="submitQCM(2)"></button>
      <button class="answer-btn" id="ans3" onclick="submitQCM(3)"></button>
    </div>

    <div class="type-zone" id="type-zone" style="display:none">
      <input type="text" class="type-input" id="type-input" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="?" autocomplete="off">
      <div class="numpad" id="numpad"></div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="screen">
    <div class="gameover-title" id="gameover-title">🧟 LE MOUTON EST DÉVORÉ !</div>
    <div style="font-size:56px;text-align:center">😱</div>

    <div class="rank-badge">
      <div class="rank-letter" id="rank-letter">B</div>
      <div class="rank-label">RANG</div>
    </div>

    <div class="score-panel">
      <div class="score-row"><span class="slabel">Temps de survie</span><span class="sval" id="stat-survive">0s</span></div>
      <div class="score-row"><span class="slabel">Bonnes réponses</span><span class="sval" id="stat-correct">0</span></div>
      <div class="score-row"><span class="slabel">Erreurs</span><span class="sval" id="stat-errors" style="color:var(--redstone)">0</span></div>
      <div class="score-row"><span class="slabel">Bonus récupérés</span><span class="sval" id="stat-bonus" style="color:#FF8888">0</span></div>
      <div class="score-row"><span class="slabel">Meilleur combo</span><span class="sval" id="stat-combo">0×</span></div>
      <hr class="score-divider">
      <div class="score-row total"><span class="slabel">SCORE FINAL</span><span class="sval" id="stat-total">0</span></div>
    </div>

    <div class="name-entry" id="name-entry-zone">
      <label>TON NOM D'AVENTURIER (3 lettres)</label>
      <input type="text" class="name-input" id="name-input" maxlength="3" placeholder="AAA" autocomplete="off">
      <button class="play-btn" id="save-btn" onclick="saveScore()" style="padding:10px">💾 ENREGISTRER</button>
    </div>

    <div class="leaderboard" id="leaderboard"></div>

    <div class="action-btns">
      <button class="retry-btn" onclick="retryGame()">🔄 REJOUER</button>
      <button class="play-btn" onclick="goHome()">🏠 MENU</button>
    </div>
  </div>

</div>
<script>
// ── CONFIG ──────────────────────────────────────────────────
const BIN_ID  = '6a071ea9adc21f119aa499ab';
const BIN_KEY = '$2a$10$MivuzmyH7rz.Re4YYd7wWOktE5kbJzWp/KG6IeFaTTDnYNW77qS3W';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const ZOMBIE_START = 2;   // % left edge
const SHEEP_POS    = 84;  // % left — where sheep stands
const DANGER_DIST  = 22;  // % distance = red zone

const BASE_SPEED        = 0.030; // %/tick (100ms) — visible dès le départ
const SPEED_PER_10OK    = 0.015; // vitesse ajoutée tous les 10 bonnes réponses
const MAX_SPEED         = 0.22;

const ERROR_JUMP      = 8;    // % forward on wrong answer
const CORRECT_PUSH    = 0;    // pas de recul sur bonne réponse normale
const BONUS_PUSH      = 14;   // % backward on bonus correct

const BONUS_MIN = 6;
const BONUS_MAX = 13;
const SPEED_PIPS = 10;

const EMOJIS_WIN  = ['💎','⭐','🏆','✨','🍄','💰','🎯','🔥'];
const EMOJIS_LOSE = ['💀','🧟','👻','🕷️','🐍'];

// ── STATE ────────────────────────────────────────────────────
let G = {};
function resetState() {
  G = {
    mode:null, table:null, lastMode:null, lastTable:null,
    score:0, errors:0, correct:0, bonusSaved:0, combo:0, bestCombo:0, totalCorrect:0,
    zombiePos: ZOMBIE_START,
    surviveSeconds:0,
    tickInterval:null, surviveInterval:null,
    questionStart:0,
    currentSpeed: BASE_SPEED,
    correctSinceLastBonus:0,
    nextBonusAt: rndBonus(),
    isBonus:false,
    question:null, correctIdx:0,
    locked:false,
    gameOver:false,
  };
}
resetState();
function rndBonus() { return BONUS_MIN + Math.floor(Math.random()*(BONUS_MAX-BONUS_MIN+1)); }

// ── JSONBIN ──────────────────────────────────────────────────
let _lb = [];
async function fetchLB() {
  try {
    const r = await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY}});
    const d = await r.json();
    _lb = d.record?.scores || [];
  } catch { try { _lb = JSON.parse(localStorage.getItem('tc_lb')||'[]'); } catch{} }
  return _lb;
}
async function pushLB(lb) {
  try {
    await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},body:JSON.stringify({scores:lb})});
    localStorage.setItem('tc_lb',JSON.stringify(lb));
  } catch { localStorage.setItem('tc_lb',JSON.stringify(lb)); }
}
async function addScore(name,score,table) {
  await fetchLB();
  _lb.push({name:name.toUpperCase().padEnd(3,'?').slice(0,3),score,table,date:Date.now()});
  _lb.sort((a,b)=>b.score-a.score);
  _lb = _lb.slice(0,20);
  await pushLB(_lb);
  return _lb;
}

// ── INIT ─────────────────────────────────────────────────────
function initTableSelector() {
  const el = document.getElementById('table-selector');
  el.innerHTML='';
  for(let i=1;i<=10;i++){
    const b=document.createElement('button');
    b.className='table-btn'; b.textContent='×'+i;
    b.onclick=()=>selectTable(i);
    el.appendChild(b);
  }
  buildPips();
  renderTop3();
}

function buildPips() {
  const w=document.getElementById('speed-pips');
  w.innerHTML='';
  for(let i=0;i<SPEED_PIPS;i++){
    const d=document.createElement('div');
    d.className='speed-pip'; d.id='pip'+i;
    w.appendChild(d);
  }
}

async function renderTop3() {
  const el=document.getElementById('top3-display');
  el.innerHTML='<span style="color:#333">chargement...</span>';
  await fetchLB();
  if(!_lb.length){el.textContent='';return;}
  el.innerHTML=_lb.slice(0,3).map((e,i)=>`<span>${['🥇','🥈','🥉'][i]} ${e.name}</span> <span>${e.score}</span>`).join('  ');
}

function selectMode(m) {
  G.mode=m;
  document.getElementById('btn-qcm').classList.toggle('active-mode',m==='qcm');
  document.getElementById('btn-type').classList.toggle('active-mode',m==='type');
  checkReady();
}
function selectTable(t) {
  G.table=t;
  document.querySelectorAll('.table-btn').forEach((b,i)=>b.classList.toggle('selected',i+1===t));
  checkReady();
}
function checkReady() {
  document.getElementById('play-btn').disabled=!(G.mode&&G.table);
}

// ── SCREENS ──────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  const m=G.mode,t=G.table;
  resetState();
  G.mode=m; G.table=t; G.lastMode=m; G.lastTable=t;
  showScreen('screen-game');
  document.getElementById('hud-table').textContent='×'+G.table;
  document.getElementById('char-zombie').style.left=ZOMBIE_START+'%';

  setZombieArt('normal');
  setSheepArt('calm');
  updateDistBar(); updatePips(); updateHUD();
  showCountdown(()=>{ nextQuestion(); startTick(); startSurvive(); });
}

function retryGame() { startGame(); }
function goHome() {
  clearInterval(G.tickInterval); clearInterval(G.surviveInterval);
  G.mode=G.lastMode; G.table=G.lastTable;
  showScreen('screen-title'); renderTop3();
}

function showCountdown(cb) {
  let n=3;
  const ov=document.createElement('div');
  ov.className='countdown-overlay';
  ov.innerHTML=`<div class="countdown-num">${n}</div><div class="countdown-label">PRÊT ?</div>`;
  document.body.appendChild(ov);
  const t=setInterval(()=>{
    n--;
    if(n<=0){clearInterval(t);ov.remove();cb();return;}
    const el=ov.querySelector('.countdown-num');
    el.textContent=n; el.style.animation='none'; void el.offsetWidth; el.style.animation='cntPop .7s ease-out';
  },800);
}

// ── TICK ─────────────────────────────────────────────────────
function startTick() {
  G.tickInterval=setInterval(()=>{
    if(G.locked||G.gameOver) return;
    G.currentSpeed=Math.min(MAX_SPEED, BASE_SPEED + Math.floor(G.totalCorrect/10)*SPEED_PER_10OK);
    G.zombiePos+=G.currentSpeed;
    moveZombie();
    updateDistBar();
    updatePips();
  },100);
}

function startSurvive() {
  G.surviveInterval=setInterval(()=>{
    if(G.gameOver) return;
    G.surviveSeconds++;
    G.score+=2;
    document.getElementById('hud-survive').textContent=G.surviveSeconds+'s';
    updateHUD();
  },1000);
}

function moveZombie(skipEnd) {
  if(G.zombiePos<ZOMBIE_START) G.zombiePos=ZOMBIE_START;
  const el=document.getElementById('char-zombie');
  el.style.left=G.zombiePos+'%';
  // grow zombie SVG as it approaches
  const dist=SHEEP_POS-G.zombiePos;
  const ratio=1-Math.min(1,dist/(SHEEP_POS-ZOMBIE_START));
  const sz=Math.round(40+ratio*16);
  el.style.width=sz+'px'; el.style.height=(sz*1.18)+'px';
  // danger tint
  const dr=Math.max(0,Math.min(1,1-dist/DANGER_DIST));
  document.getElementById('arena-danger').style.background=`rgba(255,0,0,${dr*0.28})`;

  updateSheepFear();
  if(!skipEnd && G.zombiePos>=SHEEP_POS) endGame();
}

function updateDistBar() {
  const dist=SHEEP_POS-G.zombiePos;
  const pct=Math.max(0,(dist/(SHEEP_POS-ZOMBIE_START))*100);
  const el=document.getElementById('dist-bar');
  el.style.width=pct+'%';
  el.className='dist-bar-fill'+(pct<18?' danger':pct<42?' warn':'');
}

function updatePips() {
  const ratio=(G.currentSpeed-BASE_SPEED)/(MAX_SPEED-BASE_SPEED);
  const lit=Math.round(ratio*SPEED_PIPS);
  for(let i=0;i<SPEED_PIPS;i++){
    const p=document.getElementById('pip'+i);
    if(!p) continue;
    p.className='speed-pip'+(i<lit?' lit'+(lit>7?' fast':lit>4?' med':''):'');
  }
}

function updateHUD() {
  document.getElementById('hud-score').textContent=G.score;
  document.getElementById('hud-combo').textContent=G.combo>=2?'×'+G.combo:'—';
}

// ── QUESTIONS ────────────────────────────────────────────────
function nextQuestion() {
  if(G.gameOver) return;
  G.isBonus=(G.correctSinceLastBonus>=G.nextBonusAt);
  const b=G.isBonus?(11+Math.floor(Math.random()*9)):(1+Math.floor(Math.random()*10));
  G.question={a:G.table,b,answer:G.table*b};
  G.questionStart=Date.now();

  const qEl=document.getElementById('question-display');
  qEl.className='question-text'+(G.isBonus?' bonus-q':'');
  qEl.innerHTML=`<span>${G.question.a}</span> <span class="op">×</span> <span>${G.question.b}</span> <span class="eq">=</span> <span class="blank">?</span>`;

  const card=document.getElementById('question-card');
  const old=card.querySelector('.bonus-badge');
  if(old) old.remove();
  if(G.isBonus){
    const bd=document.createElement('div');
    bd.className='bonus-badge';
    bd.textContent='★ BONUS — ZOMBIE RECULE !';
    card.appendChild(bd);
  }

  if(G.mode==='qcm') showQCM();
  else showTypeZone();
}

// ── QCM ──────────────────────────────────────────────────────
function showQCM() {
  document.getElementById('type-zone').style.display='none';
  document.getElementById('qcm-zone').style.display='grid';
  const opts=makeOpts(G.question.answer);
  opts.forEach((v,i)=>{
    const b=document.getElementById('ans'+i);
    b.textContent=v; b.className='answer-btn'; b.disabled=false;
  });
}

function makeOpts(correct) {
  const s=new Set([correct]);
  while(s.size<4){
    const fake=G.table*(1+Math.floor(Math.random()*10));
    if(fake!==correct) s.add(fake);
    if(s.size<4){
      const d=1+Math.floor(Math.random()*5);
      const f=correct+(Math.random()>.5?d:-d);
      if(f>0&&f!==correct) s.add(f);
    }
  }
  const arr=Array.from(s).slice(0,4);
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  G.correctIdx=arr.indexOf(correct);
  return arr;
}

function submitQCM(idx) {
  if(G.locked||G.gameOver) return;
  G.locked=true;
  const ok=idx===G.correctIdx;
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  document.getElementById('ans'+idx).classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById('ans'+G.correctIdx).classList.add('correct');
  handleResult(ok);
  setTimeout(()=>{G.locked=false;nextQuestion();},ok?420:820);
}

// ── TYPE ─────────────────────────────────────────────────────
function showTypeZone() {
  document.getElementById('qcm-zone').style.display='none';
  document.getElementById('type-zone').style.display='flex';
  const inp=document.getElementById('type-input');
  inp.value=''; inp.className='type-input'; inp.focus();
  buildNumpad();
}
function buildNumpad() {
  const np=document.getElementById('numpad');
  np.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'⌫',0,'OK'].forEach(v=>{
    const b=document.createElement('button');
    b.className='numpad-btn'+(v==='⌫'?' clear':v==='OK'?' ok':'');
    if(v==='OK') b.style.gridColumn='span 2';
    b.textContent=v;
    b.addEventListener('click',()=>{
      const inp=document.getElementById('type-input');
      if(v==='⌫') inp.value=inp.value.slice(0,-1);
      else if(v==='OK') submitType();
      else if(inp.value.length<3) inp.value+=v;
    });
    np.appendChild(b);
  });
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('screen-game').classList.contains('active')) return;
  if(G.mode==='type'&&e.key==='Enter') submitType();
});
function submitType() {
  if(G.locked||G.gameOver) return;
  const inp=document.getElementById('type-input');
  const val=parseInt(inp.value,10);
  if(isNaN(val)) return;
  G.locked=true;
  const ok=val===G.question.answer;
  inp.className='type-input '+(ok?'correct':'wrong');
  document.querySelectorAll('.numpad-btn').forEach(b=>b.disabled=true);
  handleResult(ok);
  setTimeout(()=>{
    document.querySelectorAll('.numpad-btn').forEach(b=>b.disabled=false);
    G.locked=false; nextQuestion();
  },ok?380:800);
}

// ── RESULT ───────────────────────────────────────────────────
function handleResult(ok) {
  if(ok){
    G.correct++; G.totalCorrect++; G.combo++;
    if(G.totalCorrect>0 && G.totalCorrect%10===0) flashSpeedUp();
    if(G.combo>G.bestCombo) G.bestCombo=G.combo;
    const elapsed=(Date.now()-G.questionStart)/1000;
    const tb=Math.max(0,Math.round((4-elapsed)*8));
    const cb=Math.floor(G.combo/3)*8;
    let pts=10+tb+cb;

    if(G.isBonus){
      G.bonusSaved++; G.correctSinceLastBonus=0; G.nextBonusAt=rndBonus();
      pts+=30; G.zombiePos-=BONUS_PUSH;
      showFeedback('🛡️ +'+pts+' ZOMBIE RECULE !','bonus');
      spawnParts(true,8); anim('char-zombie','zombie-retreat'); sheepHappy();
    } else {
      G.correctSinceLastBonus++;
      // pas de recul — le zombie continue d'avancer
      showFeedback(G.combo>=3?'+'+pts+' 🔥×'+G.combo:'+'+pts,'correct');
      if(G.combo>=3) spawnParts(true,4);
    }
    G.score+=pts;
    moveZombie();
    document.getElementById('combo-line').textContent=G.combo>=3?'🔥 COMBO ×'+G.combo+' !':'';
  } else {
    G.errors++; G.combo=0;
    G.zombiePos+=ERROR_JUMP;
    document.getElementById('combo-line').textContent='';
    showFeedback('✗ '+G.question.answer,'wrong');
    spawnParts(false,3); anim('char-zombie','zombie-lunge'); sheepScared(); flashScreen();
    moveZombie();
  }
  updateHUD();
}

function anim(id,cls){
  const el=document.getElementById(id);
  el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls),450);
}
function sheepScared(){
  const el=document.getElementById('char-sheep');
  el.classList.add('sheep-scared');
  const dist=SHEEP_POS-G.zombiePos;
  const pct=(dist/(SHEEP_POS-ZOMBIE_START));
  setSheepArt(pct<0.2?'terror':pct<0.45?'scared':'worried');
  setTimeout(()=>{
    setSheepArt(pct<0.2?'terror':pct<0.45?'scared':'calm');
    el.classList.remove('sheep-scared');
  },500);
}
function sheepHappy(){
  setSheepArt('happy');
  setTimeout(()=>setSheepArt('calm'),700);
}
function updateSheepFear(){
  if(!G||G.gameOver) return;
  const dist=SHEEP_POS-G.zombiePos;
  const pct=(dist/(SHEEP_POS-ZOMBIE_START));
  if(pct<0.15) setSheepArt('terror');
  else if(pct<0.35) setSheepArt('scared');
  else if(pct<0.55) setSheepArt('worried');
  else setSheepArt('calm');
}
function flashScreen(){
  const a=document.getElementById('app');
  a.classList.remove('flash-error'); void a.offsetWidth; a.classList.add('flash-error');
  setTimeout(()=>a.classList.remove('flash-error'),400);
}
function showFeedback(msg,type){
  const el=document.createElement('div');
  el.className='feedback '+type; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),750);
}
function spawnParts(good,count){
  const pool=good?EMOJIS_WIN:EMOJIS_LOSE;
  for(let i=0;i<count;i++) setTimeout(()=>{
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=pool[Math.floor(Math.random()*pool.length)];
    p.style.left=(15+Math.random()*70)+'%';
    p.style.top=(25+Math.random()*35)+'%';
    document.body.appendChild(p); setTimeout(()=>p.remove(),1200);
  },i*70);
}

// ── END GAME ─────────────────────────────────────────────────
function endGame() {
  if(G.gameOver) return;
  G.gameOver=true;
  clearInterval(G.tickInterval); clearInterval(G.surviveInterval);
  setSheepArt('dead');
  setZombieArt('eating');
  spawnParts(false,6);

  setTimeout(()=>{
    const final=calcFinal();
    G.score=final;
    document.getElementById('stat-survive').textContent=G.surviveSeconds+'s';
    document.getElementById('stat-correct').textContent=G.correct;
    document.getElementById('stat-errors').textContent=G.errors;
    document.getElementById('stat-bonus').textContent=G.bonusSaved;
    document.getElementById('stat-combo').textContent=G.bestCombo+'×';
    document.getElementById('stat-total').textContent=final;
    const rank=getRank(final);
    document.getElementById('rank-letter').textContent=rank;
    document.getElementById('rank-letter').style.color=rank==='S'?'var(--diamond)':rank==='A'?'var(--gold)':rank==='B'?'var(--emerald)':'#ccc';
    document.getElementById('name-input').value='';
    document.getElementById('name-entry-zone').style.display='flex';
    const sb=document.getElementById('save-btn');
    sb.disabled=false; sb.textContent='💾 ENREGISTRER';
    showScreen('screen-gameover');
    fetchLB().then(()=>renderLBUI(null));
  },700);
}

function calcFinal() {
  const acc=G.correct>0?Math.round((G.correct/Math.max(1,G.correct+G.errors))*80):0;
  return G.score+acc+G.bonusSaved*40+G.bestCombo*5;
}
function getRank(s){return s>=500?'S':s>=300?'A':s>=150?'B':s>=60?'C':'D';}

// ── LEADERBOARD UI ───────────────────────────────────────────
function renderLBUI(newEntry){
  const el=document.getElementById('leaderboard');
  el.innerHTML='<div class="lb-title">— MEILLEURS SURVIVANTS 🌍 —</div>';
  if(!_lb.length){
    el.innerHTML+='<div style="font-family:var(--vt);font-size:17px;color:#333;text-align:center;padding:8px">Pas encore de scores</div>';
    return;
  }
  _lb.slice(0,10).forEach((e,i)=>{
    const row=document.createElement('div');
    const isNew=newEntry&&e.name===newEntry.name&&e.score===newEntry.score;
    row.className='lb-row'+(i===0?' lb-gold':i===1?' lb-silver':i===2?' lb-bronze':'')+(isNew?' lb-new':'');
    row.innerHTML=`<span class="lb-rank">${i+1}.</span><span class="lb-name">${e.name}</span><span style="font-size:12px;color:#333">×${e.table}</span><span class="lb-score">${e.score}</span>`;
    el.appendChild(row);
  });
}

async function saveScore(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('name-input').focus();return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='⏳ ENVOI...';
  const entry={name:name.toUpperCase().slice(0,3),score:G.score,table:G.table};
  await addScore(entry.name,entry.score,entry.table);
  renderLBUI(entry);
  document.getElementById('name-entry-zone').style.display='none';
  spawnParts(true,6);
}

// Zombie SVG pixel-art (PvZ-style, cute, non-scary)
function setZombieArt(state){
  const el=document.getElementById('char-zombie');
  if(state==='eating'){
    el.innerHTML=ZOMBIE_EATING_SVG;
  } else {
    el.innerHTML=ZOMBIE_WALK_SVG;
  }
}

// Sheep SVG with fear levels
function setSheepArt(state){
  const el=document.getElementById('char-sheep');
  const svgs={
    calm:    SHEEP_CALM_SVG,
    worried: SHEEP_WORRIED_SVG,
    scared:  SHEEP_SCARED_SVG,
    terror:  SHEEP_TERROR_SVG,
    happy:   SHEEP_HAPPY_SVG,
    dead:    SHEEP_DEAD_SVG,
  };
  el.innerHTML=(svgs[state]||SHEEP_CALM_SVG);
}

function flashSpeedUp(){
  // Flash all pips briefly white to signal speed increase
  for(let i=0;i<SPEED_PIPS;i++){
    const p=document.getElementById('pip'+i);
    if(!p) continue;
    const orig=p.className;
    p.style.background='#FFF';
    setTimeout(()=>{p.style.background='';},300);
  }
  showFeedback('⚡ ACCÉLÉRATION !','bonus');
}

// Sheep SVGs — same shape, different face expression

  return `<svg width="44" height="44" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
  <!-- wool body -->
  <ellipse cx="11" cy="14" rx="8" ry="5" fill="${woolColor}"/>
  <circle cx="6"  cy="12" r="3" fill="${woolColor}"/>
  <circle cx="16" cy="12" r="3" fill="${woolColor}"/>
  <circle cx="9"  cy="10" r="3" fill="${woolColor}"/>
  <circle cx="13" cy="10" r="3" fill="${woolColor}"/>
  <circle cx="11" cy="9"  r="3" fill="${woolColor}"/>
  <!-- head -->
  <rect x="8" y="3" width="6" height="6" rx="1" fill="#D4C8A8"/>
  <!-- ears -->
  <rect x="6" y="5" width="2" height="2" fill="#C4A888"/>
  <rect x="14" y="5" width="2" height="2" fill="#C4A888"/>
  ${faceLines}
  <!-- legs -->
  <rect x="7"  y="18" width="2" height="4" fill="#C4A888"/>
  <rect x="13" y="18" width="2" height="4" fill="#C4A888"/>
  ${bodyExtra}
</svg>`;
}
